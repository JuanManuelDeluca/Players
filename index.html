<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deluca Agencia</title>
  <link rel="icon" type="image/png" href="Logo/logo.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="index.html" class="nav-logo">
        <img src="Logo/logo.png" alt="Deluca Agencia" />
      </a>
      <div class="nav-filters">
        <div class="filter-group search-group">
          <label for="filter-search">Buscar</label>
          <input type="text" id="filter-search" placeholder="Nombre del jugador..." autocomplete="off" />
        </div>
        <div class="filter-group">
          <label for="filter-gender">Género</label>
          <select id="filter-gender">
            <option value="all">Todos</option>
            <option value="jugador">Jugador</option>
            <option value="jugadora">Jugadora</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-position">Posición</label>
          <select id="filter-position"></select>
        </div>
        <div class="filter-group">
          <label for="filter-sub21">Sub-21</label>
          <select id="filter-sub21">
            <option value="all">Todos</option>
            <option value="federal">Sub-21 Federal</option>
            <option value="prefederal">Sub-21 Prefederal</option>
            <option value="liganac">Sub-21 Liga Nac/Arg</option>
          </select>
        </div>
      </div>
    </nav>
  </header>

  <main id="players-grid" class="players-grid"></main>

<script src="app.js"></script>
</body>
</html>
