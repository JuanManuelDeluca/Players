<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugador – Deluca Agencia</title>
  <link rel="icon" type="image/png" href="/Logo/logo.png">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="/index.html" class="nav-logo">
        <img src="/Logo/logo.png" alt="Deluca Agencia" />
      </a>
    </nav>
  </header>

  <main class="player-page">
    <a href="/index.html" class="btn-back">← Volver</a>

    <div class="player-detail">
      <div class="player-detail-left">
        <img id="detail-photo" src="" alt="" />
      </div>

      <div class="player-detail-right">
        <h1 id="detail-name"></h1>
        <div class="badges" id="detail-badges"></div>
        <p id="detail-description"></p>
      </div>

      <div class="player-videos" id="detail-videos"></div>
    </div>
  </main>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1TWntlnHPG7ogpIjC2J06-WGtRlji4oKdXoiLMHFSmE8/export?format=csv';

    function toSlug(name) {
      return name.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-');
    }

    function convertDriveImageUrl(url) {
      if (!url) return url;
      const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (fileMatch) return `https://lh3.googleusercontent.com/d/${fileMatch[1]}`;
      const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (idMatch) return `https://lh3.googleusercontent.com/d/${idMatch[1]}`;
      return url;
    }

    function splitCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (const char of row) {
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else { current += char; }
      }
      result.push(current.trim());
      return result;
    }

    function parseCSV(text) {
      const [headerLine, ...rows] = text.trim().split('\n');
      const headers = splitCSVRow(headerLine).map(h => h.toLowerCase());
      return rows
        .filter(row => row.trim())
        .map(row => {
          const cols = splitCSVRow(row);
          const obj = {};
          headers.forEach((h, i) => { obj[h] = cols[i] || ''; });
          return {
            name:           obj['nombre']              || '',
            photo:          convertDriveImageUrl(obj['foto'] || ''),
            position:       obj['posicion']            || '',
            club:           obj['club']                || '',
            descriptionUrl: obj['descripcion']         || '',
            video:          obj['video']               || '',
          };
        })
        .filter(p => p.name);
    }

    function textToHtml(text) {
      return text
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function getYouTubeId(url) {
      if (!url) return null;
      url = url.trim();
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtube.com')) {
          if (u.pathname === '/watch') return u.searchParams.get('v');
          const m = u.pathname.match(/\/(?:embed|shorts|v)\/([a-zA-Z0-9_-]+)/);
          if (m) return m[1];
        }
        if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0] || null;
      } catch {
        const m = url.match(/(?:v=|youtu\.be\/|\/embed\/|\/shorts\/|\/v\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
      }
      return null;
    }

    // Si viene con query params viejos (?name=...), redirigir a URL limpia
    const legacyName = new URLSearchParams(location.search).get('name');
    if (legacyName) {
      location.replace('/player/' + toSlug(legacyName));
    }

    // Extrae el slug de la URL: /player/valen-villoldo → "valen-villoldo"
    const slug = location.pathname.replace(/\/$/, '').split('/').pop();

    async function loadAndDisplay() {
      if (!slug) { location.href = '/'; return; }

      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const players = parseCSV(await res.text());

      const player = players.find(p => toSlug(p.name) === slug);
      if (!player) {
        document.querySelector('.player-page').innerHTML =
          '<p style="text-align:center;padding:60px;color:#aaa">Jugador no encontrado.</p>';
        return;
      }

      document.title = `${player.name} – Deluca Agencia`;

      document.getElementById('detail-photo').src = player.photo;
      document.getElementById('detail-photo').alt = `Foto de ${player.name}`;
      document.getElementById('detail-name').textContent = player.name;

      const badgesEl = document.getElementById('detail-badges');
      badgesEl.innerHTML = `
        <span class="badge badge-position">${player.position}</span>
        ${player.club ? `<span class="badge badge-club">${player.club}</span>` : ''}
      `;

      // Videos
      const videosEl = document.getElementById('detail-videos');
      const videoUrls = player.video ? player.video.split(',').map(v => v.trim()).filter(Boolean) : [];
      videoUrls.forEach(url => {
        const ytId = getYouTubeId(url);
        if (!ytId) return;
        const thumb = document.createElement('a');
        thumb.href = `https://www.youtube.com/watch?v=${ytId}`;
        thumb.target = '_blank';
        thumb.rel = 'noopener noreferrer';
        thumb.className = 'video-thumb';
        thumb.innerHTML = `
          <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="Video">
          <div class="video-play-overlay"><span>&#9654;</span></div>
        `;
        videosEl.appendChild(thumb);
      });

      // Descripción
      const descEl = document.getElementById('detail-description');
      const docsMatch = (player.descriptionUrl || '').match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
      if (docsMatch) {
        descEl.textContent = 'Cargando…';
        fetch(`https://docs.google.com/document/d/${docsMatch[1]}/export?format=txt`)
          .then(r => r.ok ? r.text() : Promise.reject(r.status))
          .then(t => { descEl.innerHTML = textToHtml(t.trim()); })
          .catch(() => { descEl.textContent = ''; });
      } else {
        descEl.innerHTML = textToHtml(player.descriptionUrl || '');
      }
    }

    loadAndDisplay().catch(() => {
      document.querySelector('.player-page').innerHTML =
        '<p style="text-align:center;padding:60px;color:#aaa">Error al cargar el jugador.</p>';
    });
  </script>
</body>
</html>
