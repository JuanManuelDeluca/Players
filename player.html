<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugador – Deluca Agencia</title>
  <link rel="icon" type="image/png" href="Logo/logo.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="index.html" class="nav-logo">
        <img src="Logo/logo.png" alt="Deluca Agencia" />
      </a>
    </nav>
  </header>

  <main class="player-page">
    <a href="index.html" class="btn-back">← Volver</a>

    <div class="player-detail">
      <div class="player-detail-left">
        <img id="detail-photo" src="" alt="" />
      </div>

      <div class="player-detail-right">
        <h1 id="detail-name"></h1>
        <div class="badges" id="detail-badges"></div>
        <p id="detail-description"></p>
      </div>

      <div class="player-videos" id="detail-videos"></div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);

    document.getElementById('detail-photo').src = params.get('photo') || '';
    document.getElementById('detail-photo').alt = `Foto de ${params.get('name')}`;
    document.getElementById('detail-name').textContent = params.get('name') || '';

    function getYouTubeId(url) {
      if (!url) return null;
      url = url.trim();
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtube.com')) {
          if (u.pathname === '/watch') return u.searchParams.get('v');
          const m = u.pathname.match(/\/(?:embed|shorts|v)\/([a-zA-Z0-9_-]+)/);
          if (m) return m[1];
        }
        if (u.hostname === 'youtu.be') {
          return u.pathname.slice(1).split('?')[0] || null;
        }
      } catch {
        const m = url.match(/(?:v=|youtu\.be\/|\/embed\/|\/shorts\/|\/v\/)([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
      }
      return null;
    }

    const videosEl = document.getElementById('detail-videos');
    const videoRaw = (params.get('video') || '').trim();
    const videoUrls = videoRaw ? videoRaw.split(',').map(v => v.trim()).filter(Boolean) : [];
    videoUrls.forEach(url => {
      const ytId = getYouTubeId(url);
      if (!ytId) return;
      const thumb = document.createElement('a');
      thumb.href = `https://www.youtube.com/watch?v=${ytId}`;
      thumb.target = '_blank';
      thumb.rel = 'noopener noreferrer';
      thumb.className = 'video-thumb';
      thumb.innerHTML = `
        <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="Video">
        <div class="video-play-overlay"><span>&#9654;</span></div>
      `;
      videosEl.appendChild(thumb);
    });

    const badgesEl = document.getElementById('detail-badges');
    const position = params.get('position') || '';
    const club = params.get('club') || '';
    badgesEl.innerHTML = `
      <span class="badge badge-position">${position}</span>
      ${club ? `<span class="badge badge-club">${club}</span>` : ''}
    `;

    // Carga la descripción: si es link de Google Docs lo descarga, si no lo muestra directo
    const descEl = document.getElementById('detail-description');
    const descValue = params.get('descriptionUrl') || '';
    const docsMatch = descValue.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);

    function textToHtml(text) {
      return text
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    if (docsMatch) {
      descEl.textContent = 'Cargando descripción…';
      fetch(`https://docs.google.com/document/d/${docsMatch[1]}/export?format=txt`)
        .then(r => r.ok ? r.text() : Promise.reject(r.status))
        .then(text => { descEl.innerHTML = textToHtml(text.trim()); })
        .catch(() => { descEl.textContent = ''; });
    } else {
      descEl.innerHTML = textToHtml(descValue);
    }
  </script>
</body>
</html>
